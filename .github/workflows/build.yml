name: Build and release GeigerMonitor

on:
  push:
    tags:
      - "v*"

jobs:
  flatpak:
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-23.08
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: GeigerMonitor.flatpak
          manifest-path: flatpak/io.github.p01t3rge1st.GeigerMonitor.yml
          cache-key: flatpak-builder-${{ github.sha }}

  release:
    needs: flatpak
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Flatpak bundle
        uses: actions/download-artifact@v4
        with:
          name: GeigerMonitor.flatpak

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: GeigerMonitor.flatpak
          generate_release_notes: true
          body: |
            ## Instalacja Flatpak

            ```bash
            flatpak install --user GeigerMonitor.flatpak
            flatpak run io.github.p01t3rge1st.GeigerMonitor
            ```

            > **Wymaganie**: flatpak musi być zainstalowany (`sudo apt install flatpak`)

